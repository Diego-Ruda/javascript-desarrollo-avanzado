<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proyecto Integrador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  </head>
  <body class="bg-gray-900 text-gray-200">
    <header class="border-b border-gray-700">
      <nav class="flex items-center justify-between px-4 py-3 max-w-7xl mx-auto">
        <a href="index.html" class="text-xl font-semibold"> Tienda EIT</a>
        <!-- Menú hamburguesa -->
        <button id="menu-btn" class="lg:hidden text-gray-300 text-2xl cursor-pointer">
          <i class="fa-solid fa-bars"></i>
        </button>
        <!-- Links Items -->
        <div id="menu" class="hidden lg:flex lg:items-center gap-6">
          <a href="index.html" class="hover:text-white">Inicio</a>
          <a href="pages/nosotros.html" class="hover:text-white">Nosotros</a>
          <a href="pages/contacto.html" class="hover:text-white">Contacto</a>
        </div>
        <!-- Carrito -->
         <div class="relative">
          <button id="cart-btn" class="text-gray-300 hover:text-white text-2xl cursor-pointer">
            <i class="fa-solid fa-cart-shopping"></i>
          </button>
          <div id="cart-menu" class="hidden absolute right-0 mt-3 w-80 bg-gray-800 border border-gray-700 rounded-lg shadow-lg p-3">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-700">
                  <th>Imagen</th>
                  <th>Nombre</th>
                  <th>Precio</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="lista-carrito"></tbody>
            </table>

            <div class="flex justify-around mt-3">
              <button id="variar-carrito" class="px-3 py-1 bg-blue-600 rounded hover:lg:bg-blue-700">Vaciar</button>
              <button id="procesar-pedido" class="px-3 py-1 bg-red-600 rounded hover:lg:bg-red-700">Comprar</button>
            </div>
          </div>
         </div>
      </nav>
    </header>
    
    <main class="max-w-7xl mx-auto px-4 py-6">
      <section class="my-6">
        <!-- carousel -->
       </section>
       <section id="lista-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 my-6">
        <!-- productos -->
       </section>
    </main>

    <footer class="text-center py-6 border-t border-gray-700 text-gray-400">
      <!-- footer -->
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
